<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pomodoro Timer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='30' y='6' width='4' height='11' rx='2' fill='%232e7d32'/><ellipse cx='23' cy='16' rx='9' ry='5' fill='%2343a047' transform='rotate(-30 23 16)'/><ellipse cx='41' cy='16' rx='9' ry='5' fill='%2343a047' transform='rotate(30 41 16)'/><circle cx='32' cy='38' r='22' fill='%23e63946'/><ellipse cx='25' cy='30' rx='6' ry='4' fill='%23ffffff' opacity='0.25'/></svg>"
    />
    <!-- Fonts (UI/Display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* =========================================================
        Pomodoro single-file app
        - Neutral placeholder styling (no specific brand colors/fonts)
        - Background particles in the furthest layer
        - Responsive: tasks panel moves below on small screens
      ========================================================= */

      :root {
        --bg: #0f1115;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.9);
        --muted: rgba(255, 255, 255, 0.65);
        --border: rgba(255, 255, 255, 0.14);
        --shadow: rgba(0, 0, 0, 0.35);
        --ring-track: rgba(255, 255, 255, 0.12);
        --ring-fill: rgba(255, 255, 255, 0.75);
        --focus: rgba(255, 255, 255, 0.25);
        --danger: rgba(255, 255, 255, 0.85);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: radial-gradient(1200px 600px at 50% 35%, rgba(255, 255, 255, 0.06), transparent 55%),
          var(--bg);
        color: var(--text);
        font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        overflow-x: hidden;
      }

      /* Background particles handled by canvas (see overrides) */

      /* App layout */
      .app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 18px;
        padding: 18px;
      }

      header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        font-weight: 600;
        letter-spacing: 0.2px;
        color: var(--muted);
        text-transform: lowercase;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .ghost-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }

      .ghost-link:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 14px 40px var(--shadow);
        backdrop-filter: blur(8px);
      }

      /* Main timer panel */
      .timer-panel {
        display: grid;
        grid-template-rows: auto auto 1fr auto auto;
        padding: 18px;
        
        overflow: hidden;
      }

      .headline {
        text-align: center;
        color: var(--muted);
        padding: 12px 10px 6px;
        border-radius: 12px;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.06), transparent);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .mode-tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 10px 10px 14px;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: rgba(0, 0, 0, 0.12);
        user-select: none;
        white-space: nowrap;
        font-size: 12px;
      }

      .pill strong {
        color: var(--text);
        font-weight: 650;
      }

      .center {
        display: grid;
        place-items: center;
        padding: 16px 10px;
      }

      /* Timer ring */
      .ring-wrap {
        width: min(420px, 72vw);
        aspect-ratio: 1 / 1;
        position: relative;
        display: grid;
        place-items: center;
      }

      .ring-svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.5));
      }

      .time-stack {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
        gap: 8px;
        padding: 24px;
      }

      .status-label {
        font-size: 13px;
        letter-spacing: 0.35px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .time {
        font-size: clamp(56px, 8vw, 92px);
        font-weight: 750;
        letter-spacing: 1px;
      }

      .subtle {
        font-size: 12px;
        color: var(--muted);
      }

      /* Buttons */
      .controls {
        display: flex;
        gap: 12px;
        justify-content: center;
        padding: 10px 10px 14px;
      }

      .btn {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 16px;
        min-width: 140px;
        cursor: pointer;
        user-select: none;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.11);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .btn.primary {
        background: rgba(255, 255, 255, 0.16);
      }

      /* Music player */
      .music {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.15);
        border-radius: 12px;
      }

      .music .btn {
        min-width: unset;
        padding: 10px 12px;
        border-radius: 10px;
      }

      .music label {
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: rgba(255, 255, 255, 0.8);
      }

      /* Tasks panel */
      .tasks-panel {
        padding: 14px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        
        height: 100%;
        overflow: hidden;
      }

      .tasks-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 8px 10px;
      }

      .tasks-header h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .tasks-header .count {
        color: var(--muted);
        font-weight: 650;
      }

      .tasks-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .task-progress {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .task-progress[hidden] {
        display: none;
      }

      .task-progress-track {
        width: 90px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }

      .task-progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--color-accent), var(--color-accent-bright));
        transition: width 0.25s ease;
      }

      .task-progress-count {
        font-size: 12px;
        color: var(--muted);
        font-family: var(--font-display);
      }

      .task-input {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 8px;
      }

      .task-input input {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 12px 12px;
        outline: none;
      }

      .task-input input:focus {
        border-color: rgba(255, 255, 255, 0.24);
      }

      .task-input button {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.10);
        color: var(--text);
        padding: 12px 14px;
        cursor: pointer;
      }

      .task-input button:hover {
        background: rgba(255, 255, 255, 0.13);
      }

      .task-list {
        margin: 8px;
        padding: 8px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.16);
        overflow-y: auto;
        min-height: 0;
      }

      .task-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid transparent;
      }

      .task-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.06);
      }

      .task-item input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        margin: 0;
        align-self: center;
        justify-self: center;
        background-color: transparent;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        cursor: pointer;
        position: relative;
      }

      .task-item input[type="checkbox"]:checked {
        border-color: var(--color-accent);
      }

      .task-item input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 5px;
        height: 10px;
        border: solid var(--color-accent);
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .task-text {
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-text.done {
        color: rgba(255, 255, 255, 0.55);
        text-decoration: line-through;
      }

      .icon-btn {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.10);
      }

      .task-item .icon-btn {
        padding: 4px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
      }

      .task-item .icon-btn svg {
        display: block;
        width: 16px;
        height: 16px;
      }

      /* Footer hint */
      .hint {
        padding: 8px 8px 0;
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
      }

      /* Responsive: move tasks below */
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }
        .timer-panel,
        .tasks-panel {
          min-height: unset;
        }
      }

      @media (max-width: 460px) {
        .controls {
          flex-direction: column;
          align-items: stretch;
        }
        .btn {
          width: 100%;
          min-width: unset;
        }
        .controls-row {
          width: 100%;
        }
        .btn-equal {
          width: auto;
        }
        .music {
          grid-template-columns: 1fr;
          gap: 10px;
        }
      }
    </style>
    <!-- Spec v1.0 overrides (sci-fi theme + layout) -->
    <style>
      :root {
        --color-bg-primary: #0d1117;
        --color-bg-secondary: #1a1a2e;
        --color-bg-panel: #16213e;
        --color-accent: #00b4d8;
        --color-accent-bright: #48cae4;
        --color-accent-dim: rgba(0, 180, 216, 0.15);
        --color-text-primary: #ffffff;
        --color-text-secondary: #a8a8b3;
        --color-border: rgba(0, 180, 216, 0.2);
        --color-glow: rgba(0, 180, 216, 0.5);
        --color-hud: #1e2a4a;

        --font-display: "Orbitron", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --font-ui: "Rajdhani", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        --font-body: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

        --topbar-height: 52px;
        --music-bar-height: 56px;
        --button-height: 52px;
        --sidebar-width: 360px;
        --action-size: 400px;

        --space-xs: 8px;
        --space-sm: 16px;
        --space-md: 24px;
        --space-lg: 40px;
        --space-xl: 56px;

        --shadow-glow: 0 0 12px var(--color-glow);
        --shadow-glow-strong: 0 0 24px var(--color-glow);
        --ring-glow: drop-shadow(0 0 10px var(--color-accent));

        --transition-fast: 150ms ease;
        --transition-normal: 300ms ease;
      }

      body {
        background: radial-gradient(900px 520px at 50% 30%, rgba(0, 180, 216, 0.12), transparent 60%),
          var(--color-bg-primary);
        color: var(--color-text-primary);
        font: 14px/1.35 var(--font-body);
      }

      /* Particle canvas inside left panel */
      .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .app {
        z-index: 1;
        grid-template-columns: 1fr var(--sidebar-width);
        gap: var(--space-sm);
        padding: var(--space-sm);
        padding-bottom: calc(var(--space-sm) + var(--music-bar-height));
      }

      /* Two-panel container */
      .left-panel {
        position: relative;
        display: grid;
        grid-template-rows: var(--topbar-height) auto auto 1fr var(--music-bar-height);
        min-height: calc(100vh - (var(--space-sm) * 2) - var(--music-bar-height));
        overflow-x: hidden;
        overflow-y: auto;
        padding-bottom: var(--music-bar-height);
        border: 1px solid rgba(0, 180, 216, 0.22);
        background: linear-gradient(180deg, rgba(26, 26, 46, 0.35), rgba(13, 17, 23, 0.35));
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(0, 180, 216, 0.06), 0 0 18px rgba(0, 180, 216, 0.08);
        border-radius: 14px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-md);
        height: var(--topbar-height);
        background: rgba(13, 17, 23, 0.58);
        border-bottom: 1px solid rgba(0, 180, 216, 0.22);
        backdrop-filter: blur(8px);
      }

      .brand {
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 18px;
        color: var(--color-text-primary);
        letter-spacing: 0.04em;
      }

      .ghost-link {
        border: 1px solid transparent;
        color: var(--color-text-secondary);
        transition: color var(--transition-fast), border-color var(--transition-fast);
      }
      .ghost-link:hover {
        color: var(--color-accent);
        border-color: rgba(0, 180, 216, 0.15);
      }
      .ghost-link:focus-visible {
        outline: 2px solid var(--color-accent);
      }

      .banner {
        text-align: center;
        font-style: normal;
        font-family: var(--font-display);
        font-size: 14px;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.9);
        padding: 12px var(--space-md);
        border-top: 1px solid rgba(0, 180, 216, 0.15);
        border-bottom: 0;
      }

      .tabs {
        position: relative;
        display: flex;
        justify-content: center;
        gap: 22px;
        padding: var(--space-md) var(--space-md) var(--space-sm);
        font-family: var(--font-ui);
      }

      .tab {
        position: relative;
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
        border: 0;
        background: transparent;
        padding: 6px 2px 10px;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 16px;
        letter-spacing: 0.02em;
      }
      .tab:hover {
        color: var(--color-text-primary);
      }
      .tab[aria-selected="true"] {
        color: var(--color-text-primary);
        font-weight: 700;
      }
      .tab-badge {
        font-family: var(--font-display);
        font-size: 12px;
        color: rgba(72, 202, 228, 0.85);
      }
      .tab:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 4px;
        border-radius: 8px;
      }

      .tab-underline {
        position: absolute;
        bottom: 8px;
        height: 2px;
        width: 80px;
        left: 0;
        transform: translateX(-50%);
        background: var(--color-accent);
        box-shadow: 0 0 12px rgba(0, 180, 216, 0.35);
        border-radius: 2px;
        transition: left var(--transition-normal), width var(--transition-normal);
      }

      .timer-area {
        position: relative;
        display: grid;
        place-items: center;
        align-items: center;
        padding: var(--space-lg) var(--space-md) var(--space-md);
      }

      /* HUD layer behind ring */
      .hud-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
        opacity: 0.25;
        pointer-events: none;
        background:
          repeating-linear-gradient(135deg, rgba(42, 63, 111, 0.40) 0 2px, transparent 2px 18px),
          repeating-linear-gradient(45deg, rgba(42, 63, 111, 0.30) 0 1px, transparent 1px 22px);
        mask-image: radial-gradient(circle at 50% 45%, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0) 65%);
        transform-origin: 50% 50%;
        animation: hudDrift 28s linear infinite;
      }

      .hud-dots {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      .hud-dot {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(0, 180, 216, 0.45);
        box-shadow: 0 0 6px #00b4d8;
        animation: dotPulse 2.1s ease-in-out infinite;
      }
      @keyframes hudDrift {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        100% {
          transform: translate3d(-18px, 10px, 0) rotate(2deg);
        }
      }
      @keyframes dotPulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 0.8;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .hud-layer,
        .hud-dot {
          animation: none !important;
        }
      }

      /* Ring overrides */
      .ring-wrap {
        z-index: 10;
        width: min(var(--action-size), 72vw);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ring-svg {
        filter: var(--ring-glow);
        will-change: transform;
      }
      .status-label {
        font-family: var(--font-ui);
        letter-spacing: 0.18em;
        color: var(--color-text-secondary);
        font-size: 12px;
      }
      .time {
        font-family: var(--font-display);
        letter-spacing: 0.05em;
        font-weight: 700;
      }

      /* Primary action button (START/STOP) */
      .controls {
        padding: var(--space-md) var(--space-md) var(--space-lg);
        align-items: center;
      }
      .btn {
        border: 1.5px solid var(--color-accent);
        background: rgba(0, 180, 216, 0.08);
        color: var(--color-accent);
        border-radius: 6px;
        height: var(--button-height);
        min-width: min(var(--action-size), 85%);
        font-family: var(--font-ui);
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transition: all 200ms ease;
        box-shadow: 0 0 12px rgba(0, 180, 216, 0.5), inset 0 0 8px rgba(0, 180, 216, 0.1);
      }
      .btn:hover {
        background: rgba(0, 180, 216, 0.2);
        color: var(--color-text-primary);
        box-shadow: var(--shadow-glow-strong), inset 0 0 10px rgba(0, 180, 216, 0.15);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:focus-visible {
        outline: 2px solid var(--color-accent);
      }

      .controls-row {
        display: flex;
        gap: 24px;
        align-items: center;
        justify-content: center;
        width: min(var(--action-size), 85%);
        margin: 0 auto;
      }
      .btn-equal {
        flex: 1 1 0;
        min-width: 0;
        display: grid;
        place-items: center;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        box-shadow: none;
      }
      .btn:disabled:hover {
        background: rgba(0, 180, 216, 0.08);
        color: var(--color-accent);
        box-shadow: none;
      }

      /* Music bar fixed at bottom (left panel only) */
      .musicbar {
        z-index: 100;
        height: var(--music-bar-height);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0;
        padding: 0 var(--space-md);
        background: rgba(13, 13, 13, 0.95);
        border-top: 1px solid rgba(0, 180, 216, 0.15);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
      }
      .musicbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: flex-start;
      }
      .musicbar-center {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      .musicbar-right {
        display: flex;
        align-items: center;

      /* Hide number input spinners (minimalist, keyboard-only) */

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }
        .tasks-panel {
          min-height: unset;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="left-panel" aria-label="Pomodoro Timer">
        <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
        <div class="topbar" role="banner">
          <div class="brand" aria-label="App name">Pomodoro Timer</div>
          <div class="top-actions">
            <button id="settingsBtn" class="ghost-link" type="button" aria-label="Settings" title="Settings">
              <span aria-hidden="true" style="font-size: 18px; line-height: 1; display: inline-flex">⚙</span>
            </button>
            <button id="restartBtn" class="ghost-link" type="button" aria-label="Restart session" title="Restart session">
              <span aria-hidden="true" style="font-size: 18px; line-height: 1; display: inline-flex">↺</span>
            </button>
          </div>
        </div>

        <div class="banner" aria-live="polite">
          <span id="bannerText">why don't you conquer something today? 🙂</span>
        </div>

        <div class="tabs" role="tablist" aria-label="Session tabs">
          <button class="tab" id="tab-pomodoro" role="tab" aria-selected="true" aria-controls="timerPanel" data-tab="pomodoro">
            Pomodoro <span class="tab-badge" id="focusCount">0</span>
          </button>
          <button class="tab" id="tab-rest" role="tab" aria-selected="false" aria-controls="timerPanel" data-tab="rest">
            Rest <span class="tab-badge" id="breakCount">0</span>
          </button>
          <button class="tab" id="tab-longRest" role="tab" aria-selected="false" aria-controls="timerPanel" data-tab="longRest">
            Long Rest <span class="tab-badge" id="longRestCount">0</span>
          </button>
          <div class="tab-underline" id="tabUnderline" aria-hidden="true"></div>
        </div>

        <div class="timer-area" id="timerPanel">
          <div class="hud-layer" aria-hidden="true"></div>
          <div class="hud-dots" aria-hidden="true">
            <div class="hud-dot" style="left: 12%; top: 28%; animation-duration: 1.7s"></div>
            <div class="hud-dot" style="left: 78%; top: 22%; animation-delay: 0.4s; animation-duration: 2.3s"></div>
            <div class="hud-dot" style="left: 18%; top: 72%; animation-delay: 0.9s; animation-duration: 2.0s"></div>
            <div class="hud-dot" style="left: 84%; top: 74%; animation-delay: 1.2s; animation-duration: 2.5s"></div>
          </div>

          <div class="ring-wrap" aria-label="Timer ring">
            <!-- Segmented gradient progress ring (SVG) -->
            <svg class="ring-svg" viewBox="0 0 220 220" role="img" aria-label="Progress ring">
              <defs>
                <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="var(--color-accent-bright)" />
                  <stop offset="100%" stop-color="var(--color-accent)" />
                </linearGradient>
                <filter id="softGlow2" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="4" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <circle
                id="ringTrack"
                cx="110"
                cy="110"
                r="86"
                fill="transparent"
                stroke="rgba(0,180,216,0.10)"

                stroke-dasharray="10 4"

              <circle
                id="ringProgress"
                cx="110"
                cy="110"
                r="86"
                fill="transparent"

                cy="110"

    <!-- Settings modal -->

    <script>
      /**
       * =========================================================
       *  Local Storage Keys (Persisted state)
       * =========================================================
       * - Tasks list
       * - Music volume
       * - Music play/pause last state
       * - Session counts
       */
      const LS_KEYS = {
        tasks: "pomo_tasks_v1",
        musicVolume: "pomo_music_volume_v1",
        musicPlaying: "pomo_music_playing_v1",
        sessionCounts: "pomo_session_counts_v1",
        settings: "pomo_settings_v1",
      };

      /**
       * =========================================================
       *  Settings (durations + long rest cycle)
       * =========================================================
       */
      const DEFAULT_SETTINGS = {
        pomodoro: 25, // minutes
        rest: 5, // minutes
        longRest: 15, // minutes
        cycle: 4, // long rest every N completed pomodoros
      };

      function loadSettings() {
        const raw = localStorage.getItem(LS_KEYS.settings);
        const parsed = safeJsonParse(raw || "{}", {});
        return {
          pomodoro: Number(parsed?.pomodoro) || DEFAULT_SETTINGS.pomodoro,
          rest: Number(parsed?.rest) || DEFAULT_SETTINGS.rest,
          longRest: Number(parsed?.longRest) || DEFAULT_SETTINGS.longRest,
          cycle: Number(parsed?.cycle) || DEFAULT_SETTINGS.cycle,
        };
      }

      function saveSettings(s) {
        localStorage.setItem(LS_KEYS.settings, JSON.stringify(s));
      }

      function durationsFromSettings(s) {
        return {
          pomodoro: Math.max(1, s.pomodoro) * 60,
          rest: Math.max(1, s.rest) * 60,
          longRest: Math.max(1, s.longRest) * 60,
        };
      }

      let settings = loadSettings();
      let DURATIONS = durationsFromSettings(settings);

      /**
       * =========================================================
       *  DOM Elements
       * =========================================================
       */
      const el = {
        bannerText: document.getElementById("bannerText"),
        statusLabel: document.getElementById("statusLabel"),
        timeText: document.getElementById("timeText"),
        timerAria: document.getElementById("timerAria"),
        runningHint: document.getElementById("runningHint"),
        startPauseBtn: document.getElementById("startPauseBtn"),
        pauseBtn: document.getElementById("pauseBtn"),
        restartBtn: document.getElementById("restartBtn"),
        ringProgress: document.getElementById("ringProgress"),
        ringFill: document.getElementById("ringFill"),
        ringWrap: document.querySelector(".ring-wrap"),
        tabs: Array.from(document.querySelectorAll(".tab")),
        tabUnderline: document.getElementById("tabUnderline"),
        focusCount: document.getElementById("focusCount"),
        breakCount: document.getElementById("breakCount"),
        longRestCount: document.getElementById("longRestCount"),
        // music
        bgAudio: document.getElementById("bgAudio"),
        musicToggleBtn: document.getElementById("musicToggleBtn"),
        musicPrevBtn: document.getElementById("musicPrevBtn"),
        musicNextBtn: document.getElementById("musicNextBtn"),
        musicMenuBtn: document.getElementById("musicMenuBtn"),
        musicExpandBtn: document.getElementById("musicExpandBtn"),
        volumeRange: document.getElementById("volumeRange"),
        volumeValue: document.getElementById("volumeValue"),
        trackLabel: document.getElementById("trackLabel"),
        // tasks
        taskForm: document.getElementById("taskForm"),
        taskInput: document.getElementById("taskInput"),
        taskList: document.getElementById("taskList"),
        taskProgress: document.getElementById("taskProgress"),
        taskProgressFill: document.getElementById("taskProgressFill"),
        taskProgressCount: document.getElementById("taskProgressCount"),
        taskOptionsBtn: document.getElementById("taskOptionsBtn"),
        // modal
        restartModal: document.getElementById("restartModal"),
        restartCancelBtn: document.getElementById("restartCancelBtn"),
        restartConfirmBtn: document.getElementById("restartConfirmBtn"),
        // settings
        settingsBtn: document.getElementById("settingsBtn"),
        settingsModal: document.getElementById("settingsModal"),
        settingsCancelBtn: document.getElementById("settingsCancelBtn"),
        settingsSaveBtn: document.getElementById("settingsSaveBtn"),
        setPomodoro: document.getElementById("setPomodoro"),
        setRest: document.getElementById("setRest"),
        setLongRest: document.getElementById("setLongRest"),
        setCycle: document.getElementById("setCycle"),
        settingsError: document.getElementById("settingsError"),
      };

      /**
       * =========================================================
       *  Helpers
       * =========================================================
       */
      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function formatTime(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${mm}:${ss}`;
      }

      function safeJsonParse(str, fallback) {
        try {
          return JSON.parse(str);
        } catch {
          return fallback;
        }
      }

      function readSessionCounts() {
        const raw = localStorage.getItem(LS_KEYS.sessionCounts);
        const parsed = safeJsonParse(raw || "{}", {});
        const safe = {
          pomodoro: Number(parsed?.pomodoro) || 0,
          rest: Number(parsed?.rest) || 0,
          longRest: Number(parsed?.longRest) || 0,
        };
        return safe;
      }

      function writeSessionCounts(counts) {
        localStorage.setItem(LS_KEYS.sessionCounts, JSON.stringify(counts));
      }

      function secondsToAria(seconds) {
        const s = Math.max(0, Math.floor(seconds));
        const m = Math.floor(s / 60);
        const r = s % 60;
        const minPart = `${m} minute${m === 1 ? "" : "s"}`;
        const secPart = `${r} second${r === 1 ? "" : "s"}`;
        return `Timer: ${minPart} ${secPart} remaining`;
      }

      /**
       * =========================================================
       *  Web Audio: simple beep notification
       * =========================================================
       * - Uses Oscillator + Gain
       * - Works without external files/backend
       * - Must be called after a user gesture at least once in some browsers
       */
      let audioCtx = null;
      function ensureAudioContext() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        return audioCtx;
      }

      async function beep({ frequency = 880, durationMs = 160, volume = 0.2 } = {}) {
        const ctx = ensureAudioContext();
        if (!ctx) return;

        // Resume context if suspended (common on first interaction)
        if (ctx.state === "suspended") {
          try {
            await ctx.resume();
          } catch {
            // ignore
          }
        }

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = frequency;

        gain.gain.value = 0;
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.01);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + durationMs / 1000);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + durationMs / 1000 + 0.02);
      }

      /**
       * =========================================================
       *  Music Player + Persistence
       * =========================================================
       */
      function loadMusicPrefs() {
        const volRaw = localStorage.getItem(LS_KEYS.musicVolume);
        const vol = clamp(volRaw ? Number(volRaw) : 0.5, 0, 1);
        el.bgAudio.volume = vol;
        el.volumeRange.value = String(vol);
        el.volumeValue.textContent = `${Math.round(vol * 100)}%`;

        // Selalu tampilkan ikon play saat pertama load.
        // Browser memblokir autoplay, jadi audio tidak akan benar-benar jalan
        // sampai ada interaksi user — UI harus mencerminkan kondisi itu.
        setMusicUiState(false);
      }

      function setMusicUiState(isPlaying) {

      /**
       * =========================================================
       *  Pomodoro Timer Logic
       * =========================================================
       * Spec v1.0:
       * - Tabs: Pomodoro / Rest / Long Rest
       * - START/STOP button (STOP resets to default duration)
       * - Timer ends -> ring flashes, beep, session counter increments
       * - Auto-advance: pomodoro -> (rest or long rest after each 4th pomodoro) -> pomodoro,
       *   next session auto-starts (full automatic cycle; STOP breaks the cycle)
       * - Tab switch resets timer for that duration
       * - Ring updates smoothly via requestAnimationFrame (per-frame)
       * - Accessibility: aria label updated every second
       * - Start timer triggers background music to start if not playing
       */
      /** @type {"pomodoro"|"rest"|"longRest"} */
      let currentTab = "pomodoro";
      /** @type {"idle"|"running"|"paused"} */
      let timerState = "idle";
      let durationSeconds = DURATIONS.pomodoro;
      let timeRemaining = durationSeconds;
      let endTimeMs = 0;
      let rafId = 0;
      let titleInterval = 0;
      let lastWholeSecond = -1;

      let sessionCounts = readSessionCounts();

      const RING_R = 86;
      const RING_CIRC = 2 * Math.PI * RING_R;

      function updateCountsUi() {
        el.focusCount.textContent = String(sessionCounts.pomodoro);
        el.breakCount.textContent = String(sessionCounts.rest);
        el.longRestCount.textContent = String(sessionCounts.longRest);
      }

      function tabToLabel(tab) {
        if (tab === "pomodoro") return "FOCUS";
        if (tab === "rest") return "BREAK";
        return "LONG BREAK";
      }

      function tabToTitleMode(tab) {
        if (tab === "pomodoro") return "focus";
        if (tab === "rest") return "rest";
        return "long rest";
      }

      function tabToDuration(tab) {
        return DURATIONS[tab];
      }

      function setButtonUi() {
        const running = timerState === "running";
        const paused = timerState === "paused";

        // Left button: START when idle, STOP when running/paused
        el.startPauseBtn.textContent = (running || paused) ? "STOP" : "START";
        el.startPauseBtn.setAttribute("aria-label", (running || paused) ? "Stop timer" : "Start timer");

        // Right button: PAUSE when running, RESUME when paused, disabled when idle
        el.pauseBtn.disabled = !(running || paused);
        el.pauseBtn.textContent = paused ? "RESUME" : "PAUSE";
        el.pauseBtn.setAttribute("aria-label", paused ? "Resume timer" : "Pause timer");

        el.runningHint.textContent = running ? "Running…" : (paused ? "Paused" : "");
      }

      function setTabSelected(tab) {
        for (const t of el.tabs) {
          const isSel = t.dataset.tab === tab;
          t.setAttribute("aria-selected", String(isSel));
        }
      }

      function moveUnderlineToSelected() {
        const selected = el.tabs.find((t) => t.getAttribute("aria-selected") === "true") || el.tabs[0];
        if (!selected) return;
        const centerX = selected.offsetLeft + selected.offsetWidth / 2;
        el.tabUnderline.style.width = `${Math.max(62, selected.offsetWidth * 0.7)}px`;
        el.tabUnderline.style.left = `${centerX}px`;
      }

      function flashRingOnce() {
        if (!el.ringWrap) return;
        el.ringWrap.style.filter = "drop-shadow(0 0 18px rgba(0,180,216,0.9))";
        setTimeout(() => {
          el.ringWrap.style.filter = "";
        }, 220);
      }

      function updateTimerDisplay() {
        const progress = durationSeconds > 0 ? clamp(timeRemaining / durationSeconds, 0, 1) : 0;
        const elapsed = 1 - progress;
        // Neutral zebra ring (transparent gaps) is always visible via #ringProgress.
        // A solid blue arc (#ringFill) grows clockwise from the top as the session elapses.
        const fillLen = RING_CIRC * elapsed;
        el.ringFill.style.strokeDasharray = `${fillLen} ${RING_CIRC}`;
        el.ringFill.style.strokeDashoffset = "0";

        const whole = Math.floor(timeRemaining);
        if (whole !== lastWholeSecond) {
          lastWholeSecond = whole;
          el.timeText.textContent = formatTime(whole);
          const aria = secondsToAria(whole);
          el.timeText.setAttribute("aria-label", aria);
          if (el.timerAria) el.timerAria.textContent = aria;
        }

        // Tab title shows the countdown only while the timer is active.
        document.title =
          timerState === "idle"
            ? "Pomodoro Timer"
            : `${formatTime(whole)} - ${tabToTitleMode(currentTab)}`;
      }

      function stopRaf() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = 0;
      }

      function stopInterval() {
        if (titleInterval) clearInterval(titleInterval);
        titleInterval = 0;
      }

      function refreshFromClock() {
        const now = performance.now();
        timeRemaining = Math.max(0, (endTimeMs - now) / 1000);
        updateTimerDisplay();

        if (timeRemaining <= 0) {
          stopRaf();
          stopInterval();
          onTimerEnded();
          // Signal to the caller that the session ended. When auto-cycle runs,
          // onTimerEnded() already scheduled a fresh rAF/interval via startTimer(),
          // so tickFrame must NOT re-schedule its own loop (would double-count).
          return true;
        }
        return false;
      }

      function tickFrame() {
        if (timerState !== "running") return;
        const ended = refreshFromClock();
        // Only re-schedule if the session did not end this frame. If it ended,
        // startTimer() (called from onTimerEnded for auto-cycle) has already armed
        // a new loop, so re-scheduling here would create a second parallel rAF loop.
        if (!ended && timerState === "running") {
          rafId = requestAnimationFrame(tickFrame);
        }
      }

      function startTimer() {
        endTimeMs = performance.now() + timeRemaining * 1000;
        stopRaf();
        stopInterval();
        rafId = requestAnimationFrame(tickFrame);
        // Keep the countdown + tab title accurate even when this tab is in the
        // background, since requestAnimationFrame is paused for hidden tabs.
        titleInterval = setInterval(() => {
          if (timerState !== "running") return;
          refreshFromClock();
        }, 250);
      }

      function stopTimer() {
        if (timerState === "running") {
          timeRemaining = Math.max(0, (endTimeMs - performance.now()) / 1000);
        }
        stopRaf();
        stopInterval();
      }

      function onTimerEnded() {
        stopInterval();
        timeRemaining = 0;
        updateTimerDisplay();
        flashRingOnce();

        // Bunyikan alarm (kring) beberapa kali
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            beep({ frequency: 1050, durationMs: 120, volume: 0.3 });
            setTimeout(() => beep({ frequency: 950, durationMs: 100, volume: 0.25 }), 80);
          }, i * 280);
        }

        // Increment session counter
        sessionCounts[currentTab] = (sessionCounts[currentTab] || 0) + 1;
        writeSessionCounts(sessionCounts);
        updateCountsUi();

        // Auto-advance (full automatic cycle: next session starts immediately)
        const next = nextTabAfterEnd(currentTab);
        setTabSelected(next);
        setTimerForTab(next);        // reset timeRemaining & duration for the next tab
        timerState = "running";      // keep running for auto-cycle
        setButtonUi();               // button -> STOP
        moveUnderlineToSelected();
        startTimer();                // start countdown (focus alarm keeps beeping alongside)
      }


    
              function nextTabAfterEnd(tab) {
        if (tab === "pomodoro") {
          // sessionCounts.pomodoro already incremented for the finished pomodoro
          return settings.cycle > 0 && sessionCounts.pomodoro % settings.cycle === 0
            ? "longRest"
            : "rest";
        }
        return "pomodoro";
      }

      function setTimerForTab(tab) {
        currentTab = tab;
        durationSeconds = tabToDuration(tab);
        timeRemaining = durationSeconds;
        el.statusLabel.textContent = tabToLabel(tab);
        updateTimerDisplay();
      }

      function switchTab(tab) {
        // Hentikan timer jika sedang berjalan / paused
        if (timerState === "running" || timerState === "paused") {
          stopTimer();

        setTabSelected(tab);
        setTimerForTab(tab);
        setButtonUi();
        moveUnderlineToSelected();

        }

        if (timerState !== "running" && timerState !== "paused") {
          // START
          if (timeRemaining <= 0) {
            timeRemaining = durationSeconds;
            updateTimerDisplay();
          }
          timerState = "running";
          setButtonUi();
          startTimer(); // jalankan timer langsung, jangan tunggu musik
        } else {
          // STOP: reset ke full duration untuk tab ini (memutus auto-cycle)
          stopTimer();
          timerState = "idle";
          setTimerForTab(currentTab);
          setButtonUi();
        }
      });

      el.pauseBtn.addEventListener("click", async () => {
        if (timerState === "running") {
          // PAUSE — pertahankan sisa waktu
          stopTimer();
          timerState = "paused";
          setButtonUi();
        } else if (timerState === "paused") {
          // RESUME — lanjut dari sisa waktu
          ensureAudioContext();

            } catch {}
          }

        // idle: tombol disabled, tidak ada aksi

      /**
       * =========================================================
       *  Canvas particle background (no external libs)
       * =========================================================
       */
      const PARTICLE_COUNT = 60;
      const PARTICLE_LINE_DISTANCE = 120;
      const PARTICLE_COLOR = "#00B4D8";
      const PARTICLE_GLOW_BLUR = 8;

      /** @type {HTMLCanvasElement|null} */
      let particleCanvas = null;
      /** @type {CanvasRenderingContext2D|null} */
      let particleCtx = null;
      let particleRaf = 0;
      /** @type {{x:number,y:number,vx:number,vy:number,radius:number,opacity:number}[]} */
      let particles = [];

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function resizeParticleCanvas() {
        if (!particleCanvas) return;
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = particleCanvas.getBoundingClientRect();
        const w = Math.max(1, Math.floor(rect.width));
        const h = Math.max(1, Math.floor(rect.height));
        particleCanvas.width = Math.floor(w * dpr);
        particleCanvas.height = Math.floor(h * dpr);
        if (particleCtx) particleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Clamp particles into bounds after resize (CSS pixels)
        for (const p of particles) {
          p.x = clamp(p.x, 0, w);
          p.y = clamp(p.y, 0, h);
        }
      }

      function initCanvasParticles() {
        particleCanvas = document.getElementById("particleCanvas");
        if (!particleCanvas) return;
        particleCtx = particleCanvas.getContext("2d");
        if (!particleCtx) return;

        resizeParticleCanvas();
        const rect = particleCanvas.getBoundingClientRect();
        const w = Math.max(1, rect.width);
        const h = Math.max(1, rect.height);

        particles = Array.from({ length: PARTICLE_COUNT }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: rand(-0.4, 0.4),
          vy: rand(-0.4, 0.4),
          radius: rand(2, 5),
          opacity: rand(0.5, 1.0),
        }));

        window.addEventListener("resize", () => resizeParticleCanvas());

        // (Re)start loop
        if (particleRaf) cancelAnimationFrame(particleRaf);
        particleRaf = requestAnimationFrame(stepCanvasParticles);
      }

      function stepCanvasParticles() {
        if (!particleCanvas || !particleCtx) return;
        const ctx = particleCtx;
        const rect = particleCanvas.getBoundingClientRect();
        const w = Math.max(1, rect.width);
        const h = Math.max(1, rect.height);

        ctx.clearRect(0, 0, w, h);

        // Update + draw dots (glow)
        ctx.shadowBlur = PARTICLE_GLOW_BLUR;
        ctx.shadowColor = PARTICLE_COLOR;
        ctx.fillStyle = PARTICLE_COLOR;

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) {
            p.x = 0;
            p.vx *= -1;
          } else if (p.x > w) {
            p.x = w;
            p.vx *= -1;
          }

          if (p.y < 0) {
            p.y = 0;
            p.vy *= -1;
          } else if (p.y > h) {
            p.y = h;
            p.vy *= -1;
          }

          ctx.globalAlpha = p.opacity;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Draw lines (no glow)
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        ctx.strokeStyle = PARTICLE_COLOR;
        ctx.lineWidth = 1;

        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i];
            const b = particles[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < PARTICLE_LINE_DISTANCE) {
              const alpha = (1 - d / PARTICLE_LINE_DISTANCE) * 0.4;
              ctx.globalAlpha = alpha;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }

        ctx.globalAlpha = 1;
        particleRaf = requestAnimationFrame(stepCanvasParticles);
      }

      /**
       * =========================================================
       *  App init
       * =========================================================
       */
      function init() {
        // Load persisted data
        loadTasks();
        loadMusicPrefs();

        // Session counters (persisted)
        updateCountsUi();

        // particle background (canvas)
        initCanvasParticles();

        // Keep UI in sync if the audio ends/pauses due to browser policies
        el.bgAudio.addEventListener("play", () => setMusicUiState(true));
        el.bgAudio.addEventListener("pause", () => setMusicUiState(false));

        // Banner rotation
        const banners = [
          "why don't you conquer something today? 🙂",
          "one step at a time. you got this. 🚀",
          "focus now, reward later. ✨",
          "small progress is still progress. 💡",
        ];
        let bannerIdx = 0;
        setInterval(() => {
          bannerIdx = (bannerIdx + 1) % banners.length;
          el.bannerText.textContent = banners[bannerIdx];
        }, 7000);

        // Start on pomodoro tab
        switchTab("pomodoro");
        // Underline position after layout settles
        requestAnimationFrame(() => moveUnderlineToSelected());
      }

      init();

      // =========================================================
      //  🛠️ Dev helpers — console only, for testing
      //  Usage:
      //    DEV.setTime(10)   → set timer ke 10 detik
      //    DEV.testKring()   → bunyikan alarm kring x5
      // =========================================================
      window.DEV = {
        setTime(seconds) {
          timeRemaining = seconds;
          updateTimerDisplay();
          console.log(`⏱ Timer set ke ${seconds} detik`);
        },
        testKring() {
          console.log("🔔 Membunyikan kring x5...");
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              beep({ frequency: 1050, durationMs: 120, volume: 0.3 });
              setTimeout(() => beep({ frequency: 950, durationMs: 100, volume: 0.25 }), 80);
            }, i * 280);
          }
        },
      };
      console.log("🛠️ DEV tools siap. Coba: DEV.setTime(10) atau DEV.testKring()");
    </script>
